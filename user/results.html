<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Bài Thi — PTIT</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .result-hero {
            background: linear-gradient(135deg, var(--ptit-dark), var(--ptit-navy));
            border-radius: var(--radius-lg);
            padding: 36px;
            color: #fff;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .result-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(192, 39, 45, .2) 0%, transparent 60%)
        }

        .score-circle {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            position: relative
        }

        .score-value {
            font-size: 36px;
            font-weight: 800;
            color: #fff
        }

        .score-max {
            font-size: 16px;
            color: rgba(255, 255, 255, .6);
            font-weight: 500
        }

        .stat-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap
        }

        .stat-item {
            text-align: center
        }

        .stat-val {
            font-size: 24px;
            font-weight: 800;
            color: #fff
        }

        .stat-lbl {
            font-size: 11px;
            color: rgba(255, 255, 255, .65);
            text-transform: uppercase;
            letter-spacing: .4px;
            margin-top: 2px
        }

        .review-item {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 14px;
            overflow: hidden;
            transition: all var(--transition)
        }

        .review-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none
        }

        .review-header:hover {
            background: var(--surface2)
        }

        .review-qtext {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            flex: 1;
            margin-right: 12px
        }

        .review-body {
            padding: 0 18px 16px;
            border-top: 1px solid var(--border);
            display: none
        }

        .review-body.open {
            display: block
        }

        .review-explain {
            margin-top: 12px;
            padding: 12px;
            background: var(--info-soft);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--info);
            border-left: 3px solid var(--info)
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px
        }

        .chart-canvas-wrap {
            position: relative;
            height: 220px
        }

        @media(max-width:700px) {
            .chart-grid {
                grid-template-columns: 1fr
            }

            .stat-row {
                gap: 20px
            }
        }
    </style>
</head>

<body>
    <!-- TOPBAR -->
    <div class="topbar">
        <a class="topbar-logo" href="dashboard.html" style="text-decoration:none">
            <div
                style="width:40px;height:40px;background:var(--ptit-red);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px">
                P</div>
            <div>
                <div class="logo-text">PExam PTIT</div>
                <div class="logo-sub">Kết quả bài thi</div>
            </div>
        </a>
        <div class="topbar-spacer"></div>
        <div class="topbar-actions">
            <a href="dashboard.html" class="btn btn-ghost btn-sm"><i class="fas fa-home"></i> Trang chủ</a>
            <button class="btn btn-outline btn-sm" onclick="window.print()"><i class="fas fa-print"></i> In kết
                quả</button>
            <div class="dropdown" style="position:relative">
                <div class="topbar-user" id="userMenuBtn"
                    style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 8px;border-radius:var(--radius);transition:background var(--transition)"
                    onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">
                    <div class="topbar-avatar" id="userAvatar" style="cursor:pointer">?</div>
                    <span id="userNameDisplay"
                        style="font-size:13px;font-weight:600;color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                    <i class="fas fa-chevron-down" style="font-size:10px;color:var(--text-muted)"></i>
                </div>
                <div class="topbar-dropdown"
                    style="position:absolute;right:0;top:calc(100% + 8px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);min-width:180px;z-index:200;overflow:hidden;display:none"
                    id="userDropdown">
                    <div style="padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2)">
                        <div style="font-size:13px;font-weight:700" id="dropUserName"></div>
                        <div style="font-size:11px;color:var(--text-muted)">Sinh viên</div>
                    </div>
                    <a href="dashboard.html"
                        style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:var(--text);text-decoration:none;transition:background var(--transition)"
                        onmouseenter="this.style.background='var(--surface2)'"
                        onmouseleave="this.style.background=''"><i class="fas fa-tachometer-alt"
                            style="color:var(--ptit-red);width:16px"></i> Trang chủ</a>
                    <button data-logout
                        style="width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:var(--danger);border:none;background:none;cursor:pointer;transition:background var(--transition)"
                        onmouseenter="this.style.background='var(--surface2)'"
                        onmouseleave="this.style.background=''"><i class="fas fa-sign-out-alt" style="width:16px"></i>
                        Đăng xuất</button>
                </div>
            </div>
        </div>
    </div>

    <div class="user-layout">
        <div class="user-main">

            <!-- RESULT HERO -->
            <div class="result-hero" id="resultHero">
                <div id="passBadgeWrap" style="margin-bottom:16px"></div>
                <canvas id="scoreDonut" width="140" height="140"
                    style="max-width:140px;margin:0 auto 16px;display:block"></canvas>
                <div class="score-value" id="scoreValue">—</div>
                <div class="score-max" id="scoreMax">/ 10 điểm</div>
                <div id="examTitleHero" style="font-size:16px;margin-top:8px;opacity:.8"></div>
                <div class="stat-row">
                    <div class="stat-item">
                        <div class="stat-val" id="statCorrect">—</div>
                        <div class="stat-lbl">Câu đúng</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statWrong">—</div>
                        <div class="stat-lbl">Câu sai</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statSkipped">—</div>
                        <div class="stat-lbl">Bỏ qua</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statDuration">—</div>
                        <div class="stat-lbl">Thời gian</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statPct">—</div>
                        <div class="stat-lbl">Tỷ lệ đúng</div>
                    </div>
                </div>
            </div>

            <!-- CHARTS -->
            <div class="chart-grid" id="chartGrid">
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-chart-pie"></i> Phân bố câu trả lời</h4>
                    </div>
                    <div class="card-body"
                        style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%">
                        <div class="chart-canvas-wrap" style="width:100%;max-width:250px;margin:0 auto"><canvas
                                id="pieChart"></canvas></div>
                        <div class="legend mt-4" style="margin-top:16px;justify-content:center">
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#16a34a"></div> Đúng
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#dc2626"></div> Sai
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#94a3b8"></div> Bỏ qua
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-chart-bar"></i> So sánh với lớp</h4>
                    </div>
                    <div class="card-body">
                        <div class="chart-canvas-wrap"><canvas id="barChart"></canvas></div>
                    </div>
                </div>
            </div>

            <!-- REVIEW SECTION -->
            <div class="card" id="reviewSection">
                <div class="card-header">
                    <h4><i class="fas fa-list-alt"></i> Xem lại chi tiết câu trả lời</h4>
                    <div class="flex gap-2">
                        <span class="badge badge-green" id="correctCount"></span>
                        <span class="badge badge-red" id="wrongCount"></span>
                    </div>
                </div>
                <div class="card-body" id="reviewBody">
                    <div style="text-align:center;padding:20px;color:var(--text-muted)"><i
                            class="fas fa-spinner fa-spin"></i> Đang tải...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        function escHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function (m) { return map[m]; });
        }

        const session = Auth.requireAuth('student');
        document.getElementById('userAvatar').textContent = session.avatar;
        document.getElementById('userNameDisplay').textContent = session.name;
        document.getElementById('dropUserName').textContent = session.name;
        // Avatar dropdown
        const menuBtn = document.getElementById('userMenuBtn');
        const dropdown = document.getElementById('userDropdown');
        menuBtn.addEventListener('click', e => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block'; });
        document.addEventListener('click', () => { dropdown.style.display = 'none'; });
        document.querySelectorAll('[data-logout]').forEach(btn => btn.addEventListener('click', () => { Auth.logout(); location.href = '../index.html'; }));

        const params = new URLSearchParams(location.search);
        const examId = params.get('examId');
        const userId = params.get('userId') || session.userId;

        const exam = DB.getExam(examId);
        let result = DB.getResult(userId, examId);

        // If newly submitted, use sessionStorage
        if (params.get('new') && !result) {
            const sr = JSON.parse(sessionStorage.getItem('lastResult') || 'null');
            if (sr && sr.examId === examId) result = sr;
        }
        if (!result) { alert('Không tìm thấy kết quả!'); location.href = 'dashboard.html'; throw 0; }

        const questions = DB.getQuestions(examId);
        const answers = result.answers || [];

        // Fill hero
        const pct = Math.round((result.correct / result.total) * 100);
        document.getElementById('scoreValue').textContent = result.score.toFixed(2);
        document.getElementById('examTitleHero').textContent = exam?.title || '';
        document.getElementById('statCorrect').textContent = result.correct;
        document.getElementById('statWrong').textContent = result.total - result.correct - answers.filter(a => a === -1).length;
        document.getElementById('statSkipped').textContent = answers.filter(a => a === -1).length;
        document.getElementById('statDuration').textContent = result.duration + ' phút';
        document.getElementById('statPct').textContent = pct + '%';

        const isPassed = result.score >= (exam?.passingScore || 5);
        document.getElementById('passBadgeWrap').innerHTML = `<span class="badge ${isPassed ? 'badge-green' : 'badge-red'}" style="font-size:14px;padding:8px 20px">${isPassed ? '✅ ĐẠT' : '❌ KHÔNG ĐẠT'}</span>`;

        // Donut score chart
        const donutCtx = document.getElementById('scoreDonut').getContext('2d');
        new Chart(donutCtx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [result.score, 10 - result.score],
                    backgroundColor: [isPassed ? '#16a34a' : '#dc2626', 'rgba(255,255,255,.15)'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 1000 } }
        });

        // Pie chart
        const correct = result.correct;
        const wrong = result.total - correct - answers.filter(a => a === -1).length;
        const skipped = answers.filter(a => a === -1).length;
        new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels: ['Đúng', 'Sai', 'Bỏ qua'],
                datasets: [{ data: [correct, wrong, skipped], backgroundColor: ['#16a34a', '#dc2626', '#94a3b8'], borderWidth: 0 }]
            },
            options: { cutout: '60%', plugins: { legend: { display: false } } }
        });

        // Bar chart — compare with class
        const allResults = DB.getResultsByExam(examId);
        const scores = allResults.map(r => r.score);
        const classAvg = scores.length > 0 ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: ['Điểm của bạn', 'Điểm TB lớp', 'Cao nhất', 'Thấp nhất'],
                datasets: [{
                    data: [result.score, +classAvg.toFixed(2), Math.max(...scores, result.score), Math.min(...scores, result.score)],
                    backgroundColor: [isPassed ? '#16a34a' : '#dc2626', '#0284c7', '#d97706', '#94a3b8'],
                    borderRadius: 6
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { min: 0, max: 10, grid: { color: '#e2e8f0' } }, x: { grid: { display: false } } }
            }
        });

        // Review
        if (questions.length > 0) {
            document.getElementById('correctCount').textContent = `${correct} đúng`;
            document.getElementById('wrongCount').textContent = `${wrong + skipped} sai/bỏ`;
            const letters = ['A', 'B', 'C', 'D', 'E'];
            document.getElementById('reviewBody').innerHTML = questions.map((q, i) => {
                const userAns = answers[i] ?? -1;
                const isCorrect = userAns === q.correct;
                const isSkipped = userAns === -1;
                const icon = isCorrect ? '✅' : isSkipped ? '⬜' : '❌';
                const opts = q.options.map((opt, j) => {
                    let cls = '';
                    if (j === q.correct) cls = 'correct';
                    else if (j === userAns) cls = 'wrong';
                    return `<div class="option-item ${cls}" style="pointer-events:none;opacity:${cls ? 1 : .7}">
        <div class="option-letter">${letters[j]}</div>
        <div class="option-text">${escHtml(opt)}${j === q.correct ? ' <strong style="color:var(--success)">(Đáp án đúng)</strong>' : ''}${j === userAns && j !== q.correct ? ' <strong style="color:var(--danger)">(Câu trả lời của bạn)</strong>' : ''}</div>
      </div>`;
                }).join('');
                return `<div class="review-item" style="background:${isCorrect ? 'var(--success-soft)' : isSkipped ? 'var(--surface)' : 'var(--danger-soft)'}">
      <div class="review-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.fa-chevron-down').classList.toggle('fa-rotate-180')">
        <span style="font-size:13px;margin-right:10px">${icon}</span>
        <div class="review-qtext">Câu ${i + 1}: ${escHtml(q.text)}</div>
        <i class="fas fa-chevron-down" style="color:var(--text-muted);transition:transform .2s;font-size:12px"></i>
      </div>
      <div class="review-body">
        <div class="option-list" style="gap:8px;margin-top:12px">${opts}</div>
        ${q.explanation ? `<div class="review-explain"><i class="fas fa-lightbulb"></i> <strong>Giải thích:</strong> ${escHtml(q.explanation)}</div>` : ''}
      </div>
    </div>`;
            }).join('');
        } else {
            document.getElementById('reviewSection').style.display = 'none';
            document.getElementById('chartGrid').style.gridTemplateColumns = '1fr';
        }
    </script>
</body>

</html>
