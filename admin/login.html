<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin — PTIT Exam</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            overflow: hidden
        }

        .auth-bg-circle:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -120px;
            right: -100px
        }

        .auth-bg-circle:nth-child(2) {
            width: 250px;
            height: 250px;
            bottom: 60px;
            left: -40px;
            background: rgba(255, 255, 255, .03)
        }

        .auth-header-logo {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, .2);
            border: 3px solid rgba(255, 255, 255, .4);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            margin: 0 auto 14px
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, .15);
            padding: 4px 14px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-top: 8px
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-bg-circle"></div>
        <div class="auth-bg-circle"></div>

        <div class="auth-card" style="max-width:420px">
            <div class="auth-header" style="background:linear-gradient(135deg,var(--ptit-dark),var(--ptit-navy))">
                <div class="auth-header-logo"><i class="fas fa-user-shield"></i></div>
                <h1 style="color:#fff">Quản trị hệ thống</h1>
                <p style="color:rgba(255,255,255,.7)">Đăng nhập với quyền Admin</p>
                <div class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Portal</div>
            </div>

            <div class="auth-body">
                <div id="adminAlert"></div>
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập Admin</label>
                    <div class="input-group">
                        <i class="fas fa-user-tie input-icon"></i>
                        <input id="adminUsername" class="form-control" type="text" placeholder="Nhập tên đăng nhập"
                            value="admin">
                    </div>
                    <span class="form-error" id="adminUsernameErr"></span>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input id="adminPassword" class="form-control" type="password" placeholder="Nhập mật khẩu"
                            value="admin123">
                        <i class="fas fa-eye input-toggle" id="adminToggle"></i>
                    </div>
                    <span class="form-error" id="adminPasswordErr"></span>
                </div>
                <button class="btn btn-dark w-100 btn-lg" id="adminLoginBtn">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập Admin
                </button>
                <div class="auth-footer mt-4" style="margin-top:20px">
                    <a href="../index.html" style="color:var(--ptit-red);font-weight:600"><i
                            class="fas fa-arrow-left"></i> Quay về trang sinh viên</a>
                </div>
                <div class="auth-footer mt-3"
                    style="background:var(--surface2);border-radius:var(--radius);padding:10px;margin-top:12px">
                    <p style="font-size:11px"><i class="fas fa-info-circle" style="color:var(--info)"></i> Demo:
                        <strong>admin</strong> / <strong>admin123</strong></p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        (function () { const s = Auth.getSession(); if (s && s.role === 'admin') location.href = 'dashboard.html'; })();

        document.getElementById('adminToggle').addEventListener('click', function () {
            const inp = document.getElementById('adminPassword');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('adminLoginBtn').addEventListener('click', () => {
            const u = document.getElementById('adminUsername').value.trim();
            const p = document.getElementById('adminPassword').value;
            const alertEl = document.getElementById('adminAlert');
            alertEl.innerHTML = '';
            if (!u || !p) { alertEl.innerHTML = '<div class="alert alert-danger"><i class="fas fa-times-circle"></i> Vui lòng nhập đầy đủ thông tin.</div>'; return; }
            const btn = document.getElementById('adminLoginBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xác thực...';
            setTimeout(() => {
                const res = Auth.login(u, p);
                if (res.success && res.user.role === 'admin') {
                    alertEl.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Đăng nhập thành công!</div>';
                    setTimeout(() => location.href = 'dashboard.html', 700);
                } else {
                    alertEl.innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle"></i> ${res.success ? 'Tài khoản không có quyền Admin.' : res.error}</div>`;
                    btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Đăng nhập Admin';
                }
            }, 600);
        });
        document.getElementById('adminPassword').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('adminLoginBtn').click(); });
    </script>
</body>

</html>
